<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Komunikat</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #111827;
            color: #f9fafb;
            font-family: Arial, sans-serif;
        }
        .container {
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.6rem;
            margin: 0.4rem 0;
        }
        .date {
            margin-top: 1.5rem;
            font-size: 1.4rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Przepraszamy</h1>
    <p>W dniu 07.03.2026 firma jest nieczynna.</p>
    <p>Przepraszamy za niedogodności.</p>

    <br>

    <p>Op 07-03-2026 is het bedrijf gesloten.</p>
    <p>Onze excuses voor het ongemak.</p>

    <br>

    <p>On 07/03/2026 the company is closed.</p>
    <p>We apologize for the inconvenience.</p>

    <div class="date">
        07.03.2026
    </div>
</div>
</body>
</html>
